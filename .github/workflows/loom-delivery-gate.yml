name: Loom delivery gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  host-facts:
    name: loom-delivery-host-facts
    runs-on: ubuntu-latest
    outputs:
      host_facts: ${{ steps.collect.outputs.host_facts }}
    steps:
      - name: Read pull-request host facts
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            if (!pull) {
              core.setFailed("pull_request payload is required");
              return;
            }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull.number,
              per_page: 100,
            });
            const changed_paths = [...new Set(files.map((file) => file.filename))].sort();
            core.setOutput("host_facts", JSON.stringify({
              schema_version: "loom-delivery-gate-host-facts/v1",
              event: context.eventName,
              repository: { owner: context.repo.owner, name: context.repo.repo },
              change: { number: pull.number, base_sha: pull.base.sha, head_sha: pull.head.sha },
              changed_paths,
            }));

  loom-delivery-gate:
    needs: host-facts
    uses: MC-and-his-Agents/Loom/.github/workflows/loom-delivery-gate.yml@122ac2e1ae9787bda92e9ac42132e8742c386622
    permissions:
      actions: read
      contents: read
      pull-requests: read
    with:
      host_facts: ${{ needs.host-facts.outputs.host_facts }}
      profile: light
      validation_command: py-compile
      loom_ref: 122ac2e1ae9787bda92e9ac42132e8742c386622
      enforcement: enforce
